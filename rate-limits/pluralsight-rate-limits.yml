specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Pluralsight
providerId: pluralsight
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Learning
  - Engineering Metrics
notes: Pluralsight does not publish numeric rate limits for its Skills GraphQL, Flow REST, or legacy
  Reports / Licensing REST APIs in its public help documentation. Access to the APIs is gated to
  Business / Enterprise / Flow contracts and limits are governed by fair-use plus customer-success
  escalation rather than a published per-second / per-minute ceiling.
description: Pluralsight gates its APIs behind Business, Enterprise, and Flow contracts. The provider
  does not publish per-key rate limits or rate-limit response headers in its public help center;
  abuse and concurrency thresholds are managed via the customer success team. Standard 429 responses
  apply on throttling. Consumers should implement exponential backoff and contact their account
  representative if they encounter sustained throttling.
sources:
  - https://help.pluralsight.com/help/skills-business-customer-api
  - https://help.pluralsight.com/help/api-introduction
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Skills GraphQL API (paas-api.pluralsight.com)
    scope: api-key
    metric: varies
    limit: 'not publicly documented; governed by fair-use'
    notes: Subject to Business / Enterprise contract. Pagination is enforced (page-size caps in the
      GraphQL schema).
  - name: Flow REST API (flow-api.pluralsight.com / appfireflow.com)
    scope: api-key
    metric: varies
    limit: 'not publicly documented; governed by fair-use'
    notes: Per-tenant. Bulk historical pulls should be paginated and run during off-peak.
  - name: Legacy Reports / Licensing REST APIs (app.pluralsight.com)
    scope: api-key
    metric: varies
    limit: 'not publicly documented; legacy endpoints scheduled for deprecation'
policies:
  - name: Fair Use
    description: Pluralsight does not publish numeric thresholds; sustained or abusive usage is
      handled by the customer success team rather than auto-throttle headers.
  - name: Backoff
    description: On 429 / 503, retry with exponential backoff and jitter. Honor any Retry-After
      header if returned.
  - name: Pagination
    description: GraphQL APIs require cursor-based pagination; do not request unbounded result sets.
  - name: Escalation
    description: If you hit sustained throttling, contact your Pluralsight customer success manager
      to discuss higher capacity or batch export options.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
