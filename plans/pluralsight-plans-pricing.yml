    name: Skills - Core Tech
    type: subscription
    description: Individual subscription for Pluralsight Skills with access to over 3,900 courses
      across the core technology library.
    entries:
      - label: Subscription (annual billing)
        name: subscription_annual
        type: subscription
        metric: seat
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '$449/year'
        userMultiplied: true
      - label: Subscription (monthly billing)
        name: subscription_monthly
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$45/month'
        userMultiplied: true
    elements:
