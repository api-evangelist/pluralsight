description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: pluralsight-free
    name: Free
    type: freemium
    description: Free entry tier for the Pluralsight API surface. Intended for evaluation, prototyping,
      and low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://paas-api.pluralsight.com/graphql
          - https://flow-api.pluralsight.com/dora/build-release
          - https://flow-api.pluralsight.com/collaboration/code/metrics
          - https://api.appfireflow.com/collaboration/pullrequest/metrics
          - https://<workspace>.appfireflow.com/v3/customer/core
          - https://app.pluralsight.com/plans/api/reports/v1
          - https://app.pluralsight.com/plans/api/license/v1
          - https://paas-rest-api.pluralsight.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://paas-api.pluralsight.com/graphql
          - https://flow-api.pluralsight.com/dora/build-release
          - https://flow-api.pluralsight.com/collaboration/code/metrics
