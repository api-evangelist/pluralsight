specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Pluralsight
providerId: pluralsight
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Learning
  - Education
  - Skills Assessment
  - Engineering Metrics
  - Video Training
  - Technology
description: Pluralsight is a per-seat subscription business across two product lines - Pluralsight
  Skills (individual and business learning library, including Cloud Guru content) and Pluralsight Flow
  (engineering metrics). Individual Skills plans are sold direct on the public pricing page; Business,
  Enterprise, and Flow plans are quoted by the sales team. APIs (Skills GraphQL, Flow REST, legacy
  Reports/Licensing REST) are entitlements of the Business / Enterprise / Flow plans rather than
  separately metered products.
sources:
  - https://www.pluralsight.com/individuals/pricing
  - https://www.pluralsight.com/pricing
  - https://help.pluralsight.com/help/skills-business-customer-api
plans:
