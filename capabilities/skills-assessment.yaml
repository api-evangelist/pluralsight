naftiko: 1.0.0-alpha2
info:
  label: Pluralsight Skills Assessment
  description: Unified workflow for L&D managers and developers to assess skills through Skill IQ, Role IQ, and practice exams.
    Combines skills assessment, role IQ, and practice exams APIs for comprehensive competency measurement.
  tags:
  - Pluralsight
  - Skills Assessment
  - Skill IQ
  - Role IQ
  - Practice Exams
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN
capability:
  consumes:
  - type: http
    namespace: pluralsight-skills-assessment
    baseUri: https://paas-api.pluralsight.com
    description: GraphQL queries for accessing skill assessments, Skill IQ scores, assessment catalogs, and competency measurements.
    authentication:
      type: bearer
      token: '{{PLURALSIGHT_BEARER_TOKEN}}'
    resources:
    - name: skills-assessment
      path: /graphql
      description: Skills assessment queries via GraphQL
      operations:
      - name: query-skills-assessment
        method: POST
        description: Execute GraphQL queries to access skill assessments, Skill IQ scores, assessment catalogs, and competency
          measurements.
        inputParameters:
        - name: query
          in: body
          type: string
          required: true
          description: The GraphQL query string
        - name: variables
          in: body
          type: object
          required: false
          description: Variables for the GraphQL query
        - name: operationName
          in: body
          type: string
          required: false
          description: Name of the operation to execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
            operationName: '{{tools.operationName}}'
  - type: http
    namespace: pluralsight-role-iq
    baseUri: https://paas-api.pluralsight.com
    description: GraphQL queries and mutations for Role IQ assessments, role catalogs, skill assignments, and user/team role
      associations.
    authentication:
      type: bearer
      token: '{{PLURALSIGHT_BEARER_TOKEN}}'
    resources:
    - name: role-iq
      path: /graphql
      description: Role IQ management via GraphQL
      operations:
      - name: manage-role-iq
        method: POST
        description: Execute GraphQL queries and mutations for Role IQ assessments, role catalogs, skill assignments, and
          user/team role associations.
        inputParameters:
        - name: query
          in: body
          type: string
          required: true
          description: The GraphQL query string
        - name: variables
          in: body
          type: object
          required: false
          description: Variables for the GraphQL query
        - name: operationName
          in: body
          type: string
          required: false
          description: Name of the operation to execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
            operationName: '{{tools.operationName}}'
  - type: http
    namespace: pluralsight-practice-exams
    baseUri: https://paas-api.pluralsight.com
    description: GraphQL query for retrieving practice exam attempt data including scores and results.
    authentication:
      type: bearer
      token: '{{PLURALSIGHT_BEARER_TOKEN}}'
    resources:
    - name: practice-exams
      path: /graphql
      description: Practice exam queries via GraphQL
      operations:
      - name: query-practice-exams
        method: POST
        description: Execute GraphQL queries to retrieve practice exam attempt data including scores and results.
        inputParameters:
        - name: query
          in: body
          type: string
          required: true
          description: The GraphQL query string
        - name: variables
          in: body
          type: object
          required: false
          description: Variables for the GraphQL query
        - name: operationName
          in: body
          type: string
          required: false
          description: Name of the operation to execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
            operationName: '{{tools.operationName}}'
  exposes:
  - type: rest
    port: 8081
    namespace: skills-assessment-api
    description: Unified REST API for Pluralsight skills assessment including Skill IQ, Role IQ, and practice exams.
    resources:
    - path: /v1/skills-assessments
      name: skills-assessments
      description: Skill IQ assessments, scores, and competency measurements
      operations:
      - method: POST
        name: query-skills-assessment
        description: Query skill assessments and Skill IQ scores
        call: pluralsight-skills-assessment.query-skills-assessment
        with:
          query: rest.query
          variables: rest.variables
          operationName: rest.operationName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/role-iq
      name: role-iq
      description: Role IQ assessments, role catalogs, and skill assignments
      operations:
      - method: POST
        name: manage-role-iq
        description: Query and manage Role IQ assessments and role associations
        call: pluralsight-role-iq.manage-role-iq
        with:
          query: rest.query
          variables: rest.variables
          operationName: rest.operationName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/practice-exams
      name: practice-exams
      description: Practice exam attempts, scores, and results
      operations:
      - method: POST
        name: query-practice-exams
        description: Query practice exam attempt data and results
        call: pluralsight-practice-exams.query-practice-exams
        with:
          query: rest.query
          variables: rest.variables
          operationName: rest.operationName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: skills-assessment-mcp
    transport: http
    description: MCP server for AI-assisted skills assessment including Skill IQ, Role IQ, and practice exams.
    tools:
    - name: query-skills-assessment
      description: Query skill assessments, Skill IQ scores, assessment catalogs, and competency measurements.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
        openWorld: true
      call: pluralsight-skills-assessment.query-skills-assessment
      with:
        query: tools.query
        variables: tools.variables
        operationName: tools.operationName
      outputParameters:
      - type: object
        mapping: $.
    - name: manage-role-iq
      description: Query and manage Role IQ assessments, role catalogs, skill assignments, and user/team role associations.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
        openWorld: true
      call: pluralsight-role-iq.manage-role-iq
      with:
        query: tools.query
        variables: tools.variables
        operationName: tools.operationName
      outputParameters:
      - type: object
        mapping: $.
    - name: query-practice-exams
      description: Query practice exam attempt data including scores and results.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
        openWorld: true
      call: pluralsight-practice-exams.query-practice-exams
      with:
        query: tools.query
        variables: tools.variables
        operationName: tools.operationName
      outputParameters:
      - type: object
        mapping: $.
