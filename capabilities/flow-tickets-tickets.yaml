naftiko: 1.0.0-alpha2
info:
  label: Pluralsight Flow Tickets API — Tickets
  description: 'Pluralsight Flow Tickets API — Tickets. 1 operations. Lead operation: Pluralsight Get Tickets. Self-contained
    Naftiko capability covering one Pluralsight business surface.'
  tags:
  - Pluralsight
  - Tickets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PLURALSIGHT_API_KEY: PLURALSIGHT_API_KEY
capability:
  consumes:
  - type: http
    namespace: flow-tickets-tickets
    baseUri: https://{workspace}.appfireflow.com/v3/customer/core
    description: Pluralsight Flow Tickets API — Tickets business capability. Self-contained, no shared references.
    resources:
    - name: tickets
      path: /tickets
      operations:
      - name: gettickets
        method: GET
        description: Pluralsight Get Tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start_date
          in: query
          type: string
          description: Start date for the query period
        - name: end_date
          in: query
          type: string
          description: End date for the query period
    authentication:
      type: bearer
      token: '{{env.PLURALSIGHT_API_KEY}}'
  exposes:
  - type: rest
    namespace: flow-tickets-tickets-rest
    port: 8080
    description: REST adapter for Pluralsight Flow Tickets API — Tickets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tickets
      name: tickets
      description: REST surface for tickets.
      operations:
      - method: GET
        name: gettickets
        description: Pluralsight Get Tickets
        call: flow-tickets-tickets.gettickets
        with:
          start_date: rest.start_date
          end_date: rest.end_date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flow-tickets-tickets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pluralsight Flow Tickets API — Tickets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: pluralsight-get-tickets
      description: Pluralsight Get Tickets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flow-tickets-tickets.gettickets
      with:
        start_date: tools.start_date
        end_date: tools.end_date
      outputParameters:
      - type: object
        mapping: $.
