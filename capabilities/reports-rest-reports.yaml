naftiko: 1.0.0-alpha2
info:
  label: Pluralsight Reports REST API — Reports
  description: 'Pluralsight Reports REST API — Reports. 3 operations. Lead operation: Pluralsight Download Course Completion
    Report. Self-contained Naftiko capability covering one Pluralsight business surface.'
  tags:
  - Pluralsight
  - Reports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PLURALSIGHT_API_KEY: PLURALSIGHT_API_KEY
capability:
  consumes:
  - type: http
    namespace: reports-rest-reports
    baseUri: https://app.pluralsight.com/plans/api/reports/v1
    description: Pluralsight Reports REST API — Reports business capability. Self-contained, no shared references.
    resources:
    - name: course-completion
      path: /course-completion
      operations:
      - name: downloadcoursecompletionreport
        method: GET
        description: Pluralsight Download Course Completion Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: course-usage
      path: /course-usage
      operations:
      - name: downloadcourseusagereport
        method: GET
        description: Pluralsight Download Course Usage Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /users
      operations:
      - name: downloaduserreport
        method: GET
        description: Pluralsight Download User Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PLURALSIGHT_API_KEY}}'
  exposes:
  - type: rest
    namespace: reports-rest-reports-rest
    port: 8080
    description: REST adapter for Pluralsight Reports REST API — Reports. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/course-completion
      name: course-completion
      description: REST surface for course-completion.
      operations:
      - method: GET
        name: downloadcoursecompletionreport
        description: Pluralsight Download Course Completion Report
        call: reports-rest-reports.downloadcoursecompletionreport
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/course-usage
      name: course-usage
      description: REST surface for course-usage.
      operations:
      - method: GET
        name: downloadcourseusagereport
        description: Pluralsight Download Course Usage Report
        call: reports-rest-reports.downloadcourseusagereport
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: downloaduserreport
        description: Pluralsight Download User Report
        call: reports-rest-reports.downloaduserreport
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reports-rest-reports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pluralsight Reports REST API — Reports. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: pluralsight-download-course-completion-report
      description: Pluralsight Download Course Completion Report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reports-rest-reports.downloadcoursecompletionreport
      outputParameters:
      - type: object
        mapping: $.
    - name: pluralsight-download-course-usage-report
      description: Pluralsight Download Course Usage Report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reports-rest-reports.downloadcourseusagereport
      outputParameters:
      - type: object
        mapping: $.
    - name: pluralsight-download-user-report
      description: Pluralsight Download User Report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reports-rest-reports.downloaduserreport
      outputParameters:
      - type: object
        mapping: $.
