naftiko: 1.0.0-alpha2
info:
  label: Pluralsight Flow Commits API — Commits
  description: 'Pluralsight Flow Commits API — Commits. 1 operations. Lead operation: Pluralsight Get Commits. Self-contained
    Naftiko capability covering one Pluralsight business surface.'
  tags:
  - Pluralsight
  - Commits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PLURALSIGHT_API_KEY: PLURALSIGHT_API_KEY
capability:
  consumes:
  - type: http
    namespace: flow-commits-commits
    baseUri: https://{workspace}.appfireflow.com/v3/customer/core
    description: Pluralsight Flow Commits API — Commits business capability. Self-contained, no shared references.
    resources:
    - name: commits
      path: /commits
      operations:
      - name: getcommits
        method: GET
        description: Pluralsight Get Commits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start_date
          in: query
          type: string
          description: Start date for the query period
        - name: end_date
          in: query
          type: string
          description: End date for the query period
    authentication:
      type: bearer
      token: '{{env.PLURALSIGHT_API_KEY}}'
  exposes:
  - type: rest
    namespace: flow-commits-commits-rest
    port: 8080
    description: REST adapter for Pluralsight Flow Commits API — Commits. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/commits
      name: commits
      description: REST surface for commits.
      operations:
      - method: GET
        name: getcommits
        description: Pluralsight Get Commits
        call: flow-commits-commits.getcommits
        with:
          start_date: rest.start_date
          end_date: rest.end_date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flow-commits-commits-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pluralsight Flow Commits API — Commits. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: pluralsight-get-commits
      description: Pluralsight Get Commits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flow-commits-commits.getcommits
      with:
        start_date: tools.start_date
        end_date: tools.end_date
      outputParameters:
      - type: object
        mapping: $.
