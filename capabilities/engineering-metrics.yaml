naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Engineering Metrics"
  description: "Unified workflow for engineering managers to track developer productivity, code quality, collaboration, and delivery performance through Flow metrics. Combines coding metrics, collaboration metrics, DORA metrics, commits, pull requests, and tickets APIs."
  tags:
    - Pluralsight
    - Flow
    - Engineering Metrics
    - Developer Productivity
    - DORA
    - Collaboration
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_FLOW_BEARER_TOKEN: PLURALSIGHT_FLOW_BEARER_TOKEN
      PLURALSIGHT_FLOW_WORKSPACE: PLURALSIGHT_FLOW_WORKSPACE

capability:
  consumes:
    - import: pluralsight-flow-coding-metrics
      location: ./shared/flow-coding-metrics.yaml
    - import: pluralsight-flow-collaboration-metrics
      location: ./shared/flow-collaboration-metrics.yaml
    - import: pluralsight-flow-dora-metrics
      location: ./shared/flow-dora-metrics.yaml
    - import: pluralsight-flow-commits
      location: ./shared/flow-commits.yaml
    - import: pluralsight-flow-pull-requests
      location: ./shared/flow-pull-requests.yaml
    - import: pluralsight-flow-tickets
      location: ./shared/flow-tickets.yaml

  exposes:
    - type: rest
      port: 8082
      namespace: engineering-metrics-api
      description: "Unified REST API for Pluralsight Flow engineering metrics including coding, collaboration, DORA, commits, pull requests, and tickets."
      resources:
        - path: /v1/coding-metrics
          name: coding-metrics
          description: "Code-level engineering metrics and developer productivity data"
          operations:
            - method: GET
              name: get-coding-metrics
              description: "Retrieve code-level engineering metrics"
              call: "pluralsight-flow-coding-metrics.get-coding-metrics"
              with:
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/collaboration-metrics
          name: collaboration-metrics
          description: "Pull request and collaboration metrics for engineering teams"
          operations:
            - method: GET
              name: get-collaboration-metrics
              description: "Retrieve collaboration metrics for engineering teams"
              call: "pluralsight-flow-collaboration-metrics.get-collaboration-metrics"
              with:
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dora-metrics
          name: dora-metrics
          description: "DORA engineering metrics including deployment frequency and lead time"
          operations:
            - method: GET
              name: get-dora-metrics
              description: "Retrieve DORA engineering metrics"
              call: "pluralsight-flow-dora-metrics.get-dora-metrics"
              with:
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/commits
          name: commits
          description: "Commit data and aggregated metrics across repositories"
          operations:
            - method: GET
              name: get-commits
              description: "Retrieve commit data and metrics"
              call: "pluralsight-flow-commits.get-commits"
              with:
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pull-requests
          name: pull-requests
          description: "Pull request data, comments, and events across repositories"
          operations:
            - method: GET
              name: get-pull-requests
              description: "Retrieve pull request data and events"
              call: "pluralsight-flow-pull-requests.get-pull-requests"
              with:
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tickets
          name: tickets
          description: "Ticket data from connected project management tools"
          operations:
            - method: GET
              name: get-tickets
              description: "Retrieve ticket data and events"
              call: "pluralsight-flow-tickets.get-tickets"
              with:
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9092
      namespace: engineering-metrics-mcp
      transport: http
      description: "MCP server for AI-assisted engineering metrics analysis across coding, collaboration, DORA, and delivery data."
      tools:
        - name: get-coding-metrics
          description: "Retrieve code-level engineering metrics and developer productivity data with date range filtering."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-flow-coding-metrics.get-coding-metrics"
          with:
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-collaboration-metrics
          description: "Retrieve pull request and collaboration metrics for engineering teams with date range filtering."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-flow-collaboration-metrics.get-collaboration-metrics"
          with:
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dora-metrics
          description: "Retrieve DORA engineering metrics including deployment frequency, lead time for changes, change failure rate, and time to restore service."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-flow-dora-metrics.get-dora-metrics"
          with:
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-commits
          description: "Retrieve commit data and aggregated commit metrics across repositories."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-flow-commits.get-commits"
          with:
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-pull-requests
          description: "Retrieve pull request data, comments, and events across repositories."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-flow-pull-requests.get-pull-requests"
          with:
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-tickets
          description: "Retrieve ticket data including comments, events, and project associations from connected project management tools."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-flow-tickets.get-tickets"
          with:
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
