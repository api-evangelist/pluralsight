naftiko: 1.0.0-alpha2
info:
  label: Pluralsight Flow Collaboration Metrics API — Collaboration Metrics
  description: 'Pluralsight Flow Collaboration Metrics API — Collaboration Metrics. 1 operations. Lead operation: Pluralsight
    Get Collaboration Metrics. Self-contained Naftiko capability covering one Pluralsight business surface.'
  tags:
  - Pluralsight
  - Collaboration Metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PLURALSIGHT_API_KEY: PLURALSIGHT_API_KEY
capability:
  consumes:
  - type: http
    namespace: flow-collaboration-metrics-collaboration-metrics
    baseUri: https://api.appfireflow.com
    description: Pluralsight Flow Collaboration Metrics API — Collaboration Metrics business capability. Self-contained, no
      shared references.
    resources:
    - name: collaboration-pullrequest-metrics
      path: /collaboration/pullrequest/metrics
      operations:
      - name: getcollaborationmetrics
        method: GET
        description: Pluralsight Get Collaboration Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start_date
          in: query
          type: string
          description: Start date for the metrics period
        - name: end_date
          in: query
          type: string
          description: End date for the metrics period
    authentication:
      type: bearer
      token: '{{env.PLURALSIGHT_API_KEY}}'
  exposes:
  - type: rest
    namespace: flow-collaboration-metrics-collaboration-metrics-rest
    port: 8080
    description: REST adapter for Pluralsight Flow Collaboration Metrics API — Collaboration Metrics. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/collaboration/pullrequest/metrics
      name: collaboration-pullrequest-metrics
      description: REST surface for collaboration-pullrequest-metrics.
      operations:
      - method: GET
        name: getcollaborationmetrics
        description: Pluralsight Get Collaboration Metrics
        call: flow-collaboration-metrics-collaboration-metrics.getcollaborationmetrics
        with:
          start_date: rest.start_date
          end_date: rest.end_date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flow-collaboration-metrics-collaboration-metrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pluralsight Flow Collaboration Metrics API — Collaboration Metrics. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: pluralsight-get-collaboration-metrics
      description: Pluralsight Get Collaboration Metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flow-collaboration-metrics-collaboration-metrics.getcollaborationmetrics
      with:
        start_date: tools.start_date
        end_date: tools.end_date
      outputParameters:
      - type: object
        mapping: $.
