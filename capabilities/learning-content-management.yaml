naftiko: 1.0.0-alpha2
info:
  label: Pluralsight Learning Content Management
  description: Unified workflow for L&D managers and content administrators to browse, organize, and manage learning content
    across courses, channels, learning paths, programs, labs, and tags. Combines content catalog, course catalog, public catalog,
    channels, learning paths, programs, labs, content slugs, and tags APIs.
  tags:
  - Pluralsight
  - Learning Content
  - Content Management
  - Courses
  - Channels
  - Learning Paths
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN
capability:
  consumes:
  - type: http
    namespace: pluralsight-content-catalog
    baseUri: https://paas-api.pluralsight.com
    description: GraphQL query for accessing the general content catalog including videos, guides, interactive courses, and
      other content types.
    authentication:
      type: bearer
      token: '{{PLURALSIGHT_BEARER_TOKEN}}'
    resources:
    - name: content-catalog
      path: /graphql
      description: Content catalog queries via GraphQL
      operations:
      - name: query-content-catalog
        method: POST
        description: Execute GraphQL queries to retrieve the general content catalog including videos, guides, interactive
          courses, and other content types.
        inputParameters:
        - name: query
          in: body
          type: string
          required: true
          description: The GraphQL query string
        - name: variables
          in: body
          type: object
          required: false
          description: Variables for the GraphQL query
        - name: operationName
          in: body
          type: string
          required: false
          description: Name of the operation to execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
            operationName: '{{tools.operationName}}'
  - type: http
    namespace: pluralsight-content-slug
    baseUri: https://paas-api.pluralsight.com
    description: GraphQL query for resolving content slugs to internal identifiers, enabling lookup of content by human-readable
      URL slugs.
    authentication:
      type: bearer
      token: '{{PLURALSIGHT_BEARER_TOKEN}}'
    resources:
    - name: content-slugs
      path: /graphql
      description: Content slug resolution via GraphQL
      operations:
      - name: query-content-slugs
        method: POST
        description: Execute GraphQL queries to resolve content slugs to internal identifiers.
        inputParameters:
        - name: query
          in: body
          type: string
          required: true
          description: The GraphQL query string
        - name: variables
          in: body
          type: object
          required: false
          description: Variables for the GraphQL query
        - name: operationName
          in: body
          type: string
          required: false
          description: Name of the operation to execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
            operationName: '{{tools.operationName}}'
  - type: http
    namespace: pluralsight-course-catalog
    baseUri: https://paas-api.pluralsight.com
    description: GraphQL query for accessing course catalog information including titles, descriptions, authors, duration,
      release dates, and retirement status.
    authentication:
      type: bearer
      token: '{{PLURALSIGHT_BEARER_TOKEN}}'
    resources:
    - name: course-catalog
      path: /graphql
      description: Course catalog queries via GraphQL
      operations:
      - name: query-course-catalog
        method: POST
        description: Execute GraphQL queries to retrieve course catalog information including titles, descriptions, authors,
          duration, release dates, and retirement status.
        inputParameters:
        - name: query
          in: body
          type: string
          required: true
          description: The GraphQL query string
        - name: variables
          in: body
          type: object
          required: false
          description: Variables for the GraphQL query
        - name: operationName
          in: body
          type: string
          required: false
          description: Name of the operation to execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
            operationName: '{{tools.operationName}}'
  - type: http
    namespace: pluralsight-public-course-catalog
    baseUri: https://paas-rest-api.pluralsight.com
    description: Public REST API for accessing the full course catalog without authentication.
    resources:
    - name: courses
      path: /courses
      description: Public course catalog
      operations:
      - name: get-public-course-catalog
        method: GET
        description: Retrieve the full public course catalog without authentication. Returns course IDs, titles, durations,
          release dates, and retirement status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: pluralsight-channels
    baseUri: https://paas-api.pluralsight.com
    description: GraphQL queries and mutations for managing content channels including creating channels, managing members
      and groups, organizing content sections, and tracking channel progress.
    authentication:
      type: bearer
      token: '{{PLURALSIGHT_BEARER_TOKEN}}'
    resources:
    - name: channels
      path: /graphql
      description: Channel management via GraphQL
      operations:
      - name: manage-channels
        method: POST
        description: Execute GraphQL queries and mutations for managing content channels including creating channels, managing
          members and groups, organizing content sections, and tracking channel progress.
        inputParameters:
        - name: query
          in: body
          type: string
          required: true
          description: The GraphQL query string
        - name: variables
          in: body
          type: object
          required: false
          description: Variables for the GraphQL query
        - name: operationName
          in: body
          type: string
          required: false
          description: Name of the operation to execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
            operationName: '{{tools.operationName}}'
  - type: http
    namespace: pluralsight-learning-paths
    baseUri: https://paas-api.pluralsight.com
    description: GraphQL query for accessing learning path catalog data including structured sequences of courses and content
      organized around specific skills and roles.
    authentication:
      type: bearer
      token: '{{PLURALSIGHT_BEARER_TOKEN}}'
    resources:
    - name: learning-paths
      path: /graphql
      description: Learning path catalog queries via GraphQL
      operations:
      - name: query-learning-paths
        method: POST
        description: Execute GraphQL queries to retrieve learning path catalog data including structured sequences of courses
          and content organized around specific skills and roles.
        inputParameters:
        - name: query
          in: body
          type: string
          required: true
          description: The GraphQL query string
        - name: variables
          in: body
          type: object
          required: false
          description: Variables for the GraphQL query
        - name: operationName
          in: body
          type: string
          required: false
          description: Name of the operation to execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
            operationName: '{{tools.operationName}}'
  - type: http
    namespace: pluralsight-programs
    baseUri: https://paas-api.pluralsight.com
    description: GraphQL query for accessing the program catalog including structured learning programs and curriculum offerings.
    authentication:
      type: bearer
      token: '{{PLURALSIGHT_BEARER_TOKEN}}'
    resources:
    - name: programs
      path: /graphql
      description: Program catalog queries via GraphQL
      operations:
      - name: query-programs
        method: POST
        description: Execute GraphQL queries to access the program catalog including structured learning programs and curriculum
          offerings.
        inputParameters:
        - name: query
          in: body
          type: string
          required: true
          description: The GraphQL query string
        - name: variables
          in: body
          type: object
          required: false
          description: Variables for the GraphQL query
        - name: operationName
          in: body
          type: string
          required: false
          description: Name of the operation to execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
            operationName: '{{tools.operationName}}'
  - type: http
    namespace: pluralsight-labs
    baseUri: https://paas-api.pluralsight.com
    description: GraphQL queries for accessing lab catalog and lab activity data for hands-on learning experiences and practical
      exercises.
    authentication:
      type: bearer
      token: '{{PLURALSIGHT_BEARER_TOKEN}}'
    resources:
    - name: labs
      path: /graphql
      description: Lab catalog and activity queries via GraphQL
      operations:
      - name: query-labs
        method: POST
        description: Execute GraphQL queries to access lab catalog and lab activity data for hands-on learning experiences
          and practical exercises.
        inputParameters:
        - name: query
          in: body
          type: string
          required: true
          description: The GraphQL query string
        - name: variables
          in: body
          type: object
          required: false
          description: Variables for the GraphQL query
        - name: operationName
          in: body
          type: string
          required: false
          description: Name of the operation to execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
            operationName: '{{tools.operationName}}'
  - type: http
    namespace: pluralsight-tags
    baseUri: https://paas-api.pluralsight.com
    description: GraphQL query for accessing content tags and taxonomy data used to categorize and organize learning content.
    authentication:
      type: bearer
      token: '{{PLURALSIGHT_BEARER_TOKEN}}'
    resources:
    - name: tags
      path: /graphql
      description: Content tag queries via GraphQL
      operations:
      - name: query-tags
        method: POST
        description: Execute GraphQL queries to access content tags and taxonomy data used to categorize and organize learning
          content.
        inputParameters:
        - name: query
          in: body
          type: string
          required: true
          description: The GraphQL query string
        - name: variables
          in: body
          type: object
          required: false
          description: Variables for the GraphQL query
        - name: operationName
          in: body
          type: string
          required: false
          description: Name of the operation to execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
            operationName: '{{tools.operationName}}'
  exposes:
  - type: rest
    port: 8080
    namespace: learning-content-api
    description: Unified REST API for browsing and managing Pluralsight learning content across all content types.
    resources:
    - path: /v1/content-catalog
      name: content-catalog
      description: General content catalog including videos, guides, and interactive courses
      operations:
      - method: POST
        name: query-content-catalog
        description: Query the general content catalog
        call: pluralsight-content-catalog.query-content-catalog
        with:
          query: rest.query
          variables: rest.variables
          operationName: rest.operationName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/content-slugs
      name: content-slugs
      description: Resolve content slugs to internal identifiers
      operations:
      - method: POST
        name: query-content-slugs
        description: Resolve content slugs to internal identifiers
        call: pluralsight-content-slug.query-content-slugs
        with:
          query: rest.query
          variables: rest.variables
          operationName: rest.operationName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/course-catalog
      name: course-catalog
      description: Course catalog with titles, descriptions, authors, and metadata
      operations:
      - method: POST
        name: query-course-catalog
        description: Query the course catalog
        call: pluralsight-course-catalog.query-course-catalog
        with:
          query: rest.query
          variables: rest.variables
          operationName: rest.operationName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/public-courses
      name: public-courses
      description: Public course catalog accessible without authentication
      operations:
      - method: GET
        name: get-public-course-catalog
        description: Retrieve the full public course catalog
        call: pluralsight-public-course-catalog.get-public-course-catalog
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/channels
      name: channels
      description: Content channels for organizing and curating learning content
      operations:
      - method: POST
        name: manage-channels
        description: Query and manage content channels
        call: pluralsight-channels.manage-channels
        with:
          query: rest.query
          variables: rest.variables
          operationName: rest.operationName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/learning-paths
      name: learning-paths
      description: Structured sequences of courses organized around skills and roles
      operations:
      - method: POST
        name: query-learning-paths
        description: Query learning path catalog data
        call: pluralsight-learning-paths.query-learning-paths
        with:
          query: rest.query
          variables: rest.variables
          operationName: rest.operationName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/programs
      name: programs
      description: Structured learning programs and curriculum offerings
      operations:
      - method: POST
        name: query-programs
        description: Query the program catalog
        call: pluralsight-programs.query-programs
        with:
          query: rest.query
          variables: rest.variables
          operationName: rest.operationName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/labs
      name: labs
      description: Hands-on labs and practical exercises
      operations:
      - method: POST
        name: query-labs
        description: Query lab catalog and activity data
        call: pluralsight-labs.query-labs
        with:
          query: rest.query
          variables: rest.variables
          operationName: rest.operationName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tags
      name: tags
      description: Content tags and taxonomy for categorization
      operations:
      - method: POST
        name: query-tags
        description: Query content tags and taxonomy data
        call: pluralsight-tags.query-tags
        with:
          query: rest.query
          variables: rest.variables
          operationName: rest.operationName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: learning-content-mcp
    transport: http
    description: MCP server for AI-assisted learning content management across all Pluralsight content types.
    tools:
    - name: query-content-catalog
      description: Query the general content catalog including videos, guides, interactive courses, and other content types.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
        openWorld: true
      call: pluralsight-content-catalog.query-content-catalog
      with:
        query: tools.query
        variables: tools.variables
        operationName: tools.operationName
      outputParameters:
      - type: object
        mapping: $.
    - name: query-content-slugs
      description: Resolve content slugs to internal identifiers for content lookup by human-readable URL slugs.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
        openWorld: true
      call: pluralsight-content-slug.query-content-slugs
      with:
        query: tools.query
        variables: tools.variables
        operationName: tools.operationName
      outputParameters:
      - type: object
        mapping: $.
    - name: query-course-catalog
      description: Query course catalog information including titles, descriptions, authors, duration, release dates, and
        retirement status.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
        openWorld: true
      call: pluralsight-course-catalog.query-course-catalog
      with:
        query: tools.query
        variables: tools.variables
        operationName: tools.operationName
      outputParameters:
      - type: object
        mapping: $.
    - name: get-public-course-catalog
      description: Retrieve the full public course catalog including course IDs, titles, durations, release dates, and retirement
        status.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
        openWorld: true
      call: pluralsight-public-course-catalog.get-public-course-catalog
      outputParameters:
      - type: object
        mapping: $.
    - name: manage-channels
      description: Query and manage content channels including creating channels, managing members and groups, organizing
        content sections, and tracking channel progress.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
        openWorld: true
      call: pluralsight-channels.manage-channels
      with:
        query: tools.query
        variables: tools.variables
        operationName: tools.operationName
      outputParameters:
      - type: object
        mapping: $.
    - name: query-learning-paths
      description: Query learning path catalog data including structured sequences of courses and content organized around
        specific skills and roles.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
        openWorld: true
      call: pluralsight-learning-paths.query-learning-paths
      with:
        query: tools.query
        variables: tools.variables
        operationName: tools.operationName
      outputParameters:
      - type: object
        mapping: $.
    - name: query-programs
      description: Query the program catalog including structured learning programs and curriculum offerings.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
        openWorld: true
      call: pluralsight-programs.query-programs
      with:
        query: tools.query
        variables: tools.variables
        operationName: tools.operationName
      outputParameters:
      - type: object
        mapping: $.
    - name: query-labs
      description: Query lab catalog and lab activity data for hands-on learning experiences and practical exercises.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
        openWorld: true
      call: pluralsight-labs.query-labs
      with:
        query: tools.query
        variables: tools.variables
        operationName: tools.operationName
      outputParameters:
      - type: object
        mapping: $.
    - name: query-tags
      description: Query content tags and taxonomy data used to categorize and organize learning content.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
        openWorld: true
      call: pluralsight-tags.query-tags
      with:
        query: tools.query
        variables: tools.variables
        operationName: tools.operationName
      outputParameters:
      - type: object
        mapping: $.
