naftiko: 1.0.0-alpha2
info:
  label: Pluralsight Flow Integrations API — Integrations
  description: 'Pluralsight Flow Integrations API — Integrations. 1 operations. Lead operation: Pluralsight List Integrations.
    Self-contained Naftiko capability covering one Pluralsight business surface.'
  tags:
  - Pluralsight
  - Integrations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PLURALSIGHT_API_KEY: PLURALSIGHT_API_KEY
capability:
  consumes:
  - type: http
    namespace: flow-integrations-integrations
    baseUri: https://{workspace}.appfireflow.com/v3/customer/core
    description: Pluralsight Flow Integrations API — Integrations business capability. Self-contained, no shared references.
    resources:
    - name: integrations
      path: /integrations
      operations:
      - name: listintegrations
        method: GET
        description: Pluralsight List Integrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PLURALSIGHT_API_KEY}}'
  exposes:
  - type: rest
    namespace: flow-integrations-integrations-rest
    port: 8080
    description: REST adapter for Pluralsight Flow Integrations API — Integrations. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/integrations
      name: integrations
      description: REST surface for integrations.
      operations:
      - method: GET
        name: listintegrations
        description: Pluralsight List Integrations
        call: flow-integrations-integrations.listintegrations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flow-integrations-integrations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pluralsight Flow Integrations API — Integrations. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: pluralsight-list-integrations
      description: Pluralsight List Integrations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flow-integrations-integrations.listintegrations
      outputParameters:
      - type: object
        mapping: $.
