naftiko: 1.0.0-alpha2
info:
  label: Pluralsight Labs API — GraphQL
  description: 'Pluralsight Labs API — GraphQL. 1 operations. Lead operation: Pluralsight Query Labs. Self-contained Naftiko
    capability covering one Pluralsight business surface.'
  tags:
  - Pluralsight
  - GraphQL
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PLURALSIGHT_API_KEY: PLURALSIGHT_API_KEY
capability:
  consumes:
  - type: http
    namespace: labs-graphql
    baseUri: https://paas-api.pluralsight.com
    description: Pluralsight Labs API — GraphQL business capability. Self-contained, no shared references.
    resources:
    - name: graphql
      path: /graphql
      operations:
      - name: querylabs
        method: POST
        description: Pluralsight Query Labs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PLURALSIGHT_API_KEY}}'
  exposes:
  - type: rest
    namespace: labs-graphql-rest
    port: 8080
    description: REST adapter for Pluralsight Labs API — GraphQL. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/graphql
      name: graphql
      description: REST surface for graphql.
      operations:
      - method: POST
        name: querylabs
        description: Pluralsight Query Labs
        call: labs-graphql.querylabs
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: labs-graphql-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pluralsight Labs API — GraphQL. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: pluralsight-query-labs
      description: Pluralsight Query Labs
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: labs-graphql.querylabs
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
