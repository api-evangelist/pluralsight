naftiko: 1.0.0-alpha2
info:
  label: Pluralsight Flow Users API — Users
  description: 'Pluralsight Flow Users API — Users. 2 operations. Lead operation: Pluralsight List Users. Self-contained Naftiko
    capability covering one Pluralsight business surface.'
  tags:
  - Pluralsight
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PLURALSIGHT_API_KEY: PLURALSIGHT_API_KEY
capability:
  consumes:
  - type: http
    namespace: flow-users-users
    baseUri: https://{workspace}.appfireflow.com/v3/customer/core
    description: Pluralsight Flow Users API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: Pluralsight List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateusers
        method: PUT
        description: Pluralsight Update Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PLURALSIGHT_API_KEY}}'
  exposes:
  - type: rest
    namespace: flow-users-users-rest
    port: 8080
    description: REST adapter for Pluralsight Flow Users API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: Pluralsight List Users
        call: flow-users-users.listusers
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateusers
        description: Pluralsight Update Users
        call: flow-users-users.updateusers
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flow-users-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pluralsight Flow Users API — Users. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: pluralsight-list-users
      description: Pluralsight List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flow-users-users.listusers
      outputParameters:
      - type: object
        mapping: $.
    - name: pluralsight-update-users
      description: Pluralsight Update Users
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: flow-users-users.updateusers
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
