naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Flow Commits"
  description: "REST API for accessing commit data and aggregated commit metrics across repositories."
  tags:
    - Pluralsight
    - Flow
    - Commits
    - Source Control
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_FLOW_BEARER_TOKEN: PLURALSIGHT_FLOW_BEARER_TOKEN
      PLURALSIGHT_FLOW_WORKSPACE: PLURALSIGHT_FLOW_WORKSPACE

capability:
  consumes:
    - type: http
      namespace: pluralsight-flow-commits
      baseUri: https://{{PLURALSIGHT_FLOW_WORKSPACE}}.appfireflow.com/v3/customer/core
      description: "REST API for accessing commit data and aggregated commit metrics across repositories."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_FLOW_BEARER_TOKEN}}"
      resources:
        - name: commits
          path: /commits
          description: "Commit data and metrics"
          operations:
            - name: get-commits
              method: GET
              description: "Retrieve commit data and aggregated commit metrics across repositories."
              inputParameters:
                - name: start_date
                  in: query
                  type: string
                  required: false
                  description: "Start date for the query period"
                - name: end_date
                  in: query
                  type: string
                  required: false
                  description: "End date for the query period"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8109
      namespace: pluralsight-flow-commits-api
      resources:
        - path: /v1/commits
          name: commits
          description: "Access commit data"
          operations:
            - method: GET
              name: get-commits
              description: "Retrieve commit data and metrics"
              call: "pluralsight-flow-commits.get-commits"
              with:
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9109
      namespace: pluralsight-flow-commits-mcp
      transport: http
      tools:
        - name: get-commits
          description: "Retrieve commit data and aggregated commit metrics across repositories."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-flow-commits.get-commits"
          with:
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
