naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Role IQ"
  description: "GraphQL queries and mutations for Role IQ assessments, role catalogs, skill assignments, and user/team role associations."
  tags:
    - Pluralsight
    - Role IQ
    - Skills Assessment
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-role-iq
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL queries and mutations for Role IQ assessments, role catalogs, skill assignments, and user/team role associations."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: role-iq
          path: /graphql
          description: "Role IQ management via GraphQL"
          operations:
            - name: manage-role-iq
              method: POST
              description: "Execute GraphQL queries and mutations for Role IQ assessments, role catalogs, skill assignments, and user/team role associations."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8125
      namespace: pluralsight-role-iq-api
      resources:
        - path: /v1/role-iq
          name: role-iq
          description: "Manage Role IQ"
          operations:
            - method: POST
              name: manage-role-iq
              description: "Query and manage Role IQ assessments"
              call: "pluralsight-role-iq.manage-role-iq"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9125
      namespace: pluralsight-role-iq-mcp
      transport: http
      tools:
        - name: manage-role-iq
          description: "Query and manage Role IQ assessments, role catalogs, skill assignments, and user/team role associations."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          call: "pluralsight-role-iq.manage-role-iq"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
