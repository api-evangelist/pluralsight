naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Practice Exams"
  description: "GraphQL query for retrieving practice exam attempt data including scores and results."
  tags:
    - Pluralsight
    - Practice Exams
    - Skills Assessment
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-practice-exams
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL query for retrieving practice exam attempt data including scores and results."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: practice-exams
          path: /graphql
          description: "Practice exam queries via GraphQL"
          operations:
            - name: query-practice-exams
              method: POST
              description: "Execute GraphQL queries to retrieve practice exam attempt data including scores and results."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8121
      namespace: pluralsight-practice-exams-api
      resources:
        - path: /v1/practice-exams
          name: practice-exams
          description: "Query practice exams"
          operations:
            - method: POST
              name: query-practice-exams
              description: "Retrieve practice exam attempt data"
              call: "pluralsight-practice-exams.query-practice-exams"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9121
      namespace: pluralsight-practice-exams-mcp
      transport: http
      tools:
        - name: query-practice-exams
          description: "Retrieve practice exam attempt data including scores and results."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-practice-exams.query-practice-exams"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
