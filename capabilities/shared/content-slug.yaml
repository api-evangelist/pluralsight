naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Content Slug"
  description: "GraphQL query for resolving content slugs to internal identifiers, enabling lookup of content by human-readable URL slugs."
  tags:
    - Pluralsight
    - Content Slug
    - Content Resolution
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-content-slug
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL query for resolving content slugs to internal identifiers, enabling lookup of content by human-readable URL slugs."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: content-slugs
          path: /graphql
          description: "Content slug resolution via GraphQL"
          operations:
            - name: query-content-slugs
              method: POST
              description: "Execute GraphQL queries to resolve content slugs to internal identifiers."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8103
      namespace: pluralsight-content-slug-api
      resources:
        - path: /v1/content-slugs
          name: content-slugs
          description: "Resolve content slugs"
          operations:
            - method: POST
              name: query-content-slugs
              description: "Resolve content slugs to internal identifiers"
              call: "pluralsight-content-slug.query-content-slugs"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: pluralsight-content-slug-mcp
      transport: http
      tools:
        - name: query-content-slugs
          description: "Resolve content slugs to internal identifiers, enabling lookup of content by human-readable URL slugs."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-content-slug.query-content-slugs"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
