naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Reports REST"
  description: "Legacy REST API for downloading user, course completion, and course usage reports as CSV files. Deprecated as of February 2025, removal scheduled for November 2025."
  tags:
    - Pluralsight
    - Reports
    - Analytics
    - Deprecated
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-reports-rest
      baseUri: https://app.pluralsight.com/plans/api/reports/v1
      description: "Legacy REST API for downloading user, course completion, and course usage reports as CSV files. Deprecated."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: user-reports
          path: /users
          description: "User report downloads (deprecated)"
          operations:
            - name: download-user-report
              method: GET
              description: "Download a user report as CSV. Deprecated - migrate to GraphQL User Management API."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: course-completion-reports
          path: /course-completion
          description: "Course completion report downloads (deprecated)"
          operations:
            - name: download-course-completion-report
              method: GET
              description: "Download a course completion report as CSV. Deprecated - migrate to GraphQL Course Progress API."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: course-usage-reports
          path: /course-usage
          description: "Course usage report downloads (deprecated)"
          operations:
            - name: download-course-usage-report
              method: GET
              description: "Download a course usage report as CSV. Deprecated - migrate to GraphQL Course Daily Usage API."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8124
      namespace: pluralsight-reports-rest-api
      resources:
        - path: /v1/user-reports
          name: user-reports
          description: "Download user reports (deprecated)"
          operations:
            - method: GET
              name: download-user-report
              description: "Download a user report as CSV"
              call: "pluralsight-reports-rest.download-user-report"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/course-completion-reports
          name: course-completion-reports
          description: "Download course completion reports (deprecated)"
          operations:
            - method: GET
              name: download-course-completion-report
              description: "Download a course completion report as CSV"
              call: "pluralsight-reports-rest.download-course-completion-report"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/course-usage-reports
          name: course-usage-reports
          description: "Download course usage reports (deprecated)"
          operations:
            - method: GET
              name: download-course-usage-report
              description: "Download a course usage report as CSV"
              call: "pluralsight-reports-rest.download-course-usage-report"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9124
      namespace: pluralsight-reports-rest-mcp
      transport: http
      tools:
        - name: download-user-report
          description: "Download a user report as CSV. Deprecated - migrate to GraphQL."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-reports-rest.download-user-report"
          outputParameters:
            - type: object
              mapping: "$."
        - name: download-course-completion-report
          description: "Download a course completion report as CSV. Deprecated - migrate to GraphQL."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-reports-rest.download-course-completion-report"
          outputParameters:
            - type: object
              mapping: "$."
        - name: download-course-usage-report
          description: "Download a course usage report as CSV. Deprecated - migrate to GraphQL."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-reports-rest.download-course-usage-report"
          outputParameters:
            - type: object
              mapping: "$."
