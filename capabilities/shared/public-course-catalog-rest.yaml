naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Public Course Catalog REST"
  description: "Legacy public REST API for accessing the full course catalog without authentication. Returns course IDs, titles, durations, release dates, and retirement status."
  tags:
    - Pluralsight
    - Public Catalog
    - Course Catalog
    - Public API
  created: "2026-04-18"
  modified: "2026-04-18"

capability:
  consumes:
    - type: http
      namespace: pluralsight-public-course-catalog
      baseUri: https://paas-rest-api.pluralsight.com
      description: "Public REST API for accessing the full course catalog without authentication."
      resources:
        - name: courses
          path: /courses
          description: "Public course catalog"
          operations:
            - name: get-public-course-catalog
              method: GET
              description: "Retrieve the full public course catalog without authentication. Returns course IDs, titles, durations, release dates, and retirement status."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8123
      namespace: pluralsight-public-course-catalog-api
      resources:
        - path: /v1/public-courses
          name: public-courses
          description: "Access public course catalog"
          operations:
            - method: GET
              name: get-public-course-catalog
              description: "Retrieve the full public course catalog"
              call: "pluralsight-public-course-catalog.get-public-course-catalog"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9123
      namespace: pluralsight-public-course-catalog-mcp
      transport: http
      tools:
        - name: get-public-course-catalog
          description: "Retrieve the full public course catalog including course IDs, titles, durations, release dates, and retirement status."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-public-course-catalog.get-public-course-catalog"
          outputParameters:
            - type: object
              mapping: "$."
