naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Learning Paths"
  description: "GraphQL query for accessing learning path catalog data including structured sequences of courses and content organized around specific skills and roles."
  tags:
    - Pluralsight
    - Learning Paths
    - Curriculum
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-learning-paths
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL query for accessing learning path catalog data including structured sequences of courses and content organized around specific skills and roles."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: learning-paths
          path: /graphql
          description: "Learning path catalog queries via GraphQL"
          operations:
            - name: query-learning-paths
              method: POST
              description: "Execute GraphQL queries to retrieve learning path catalog data including structured sequences of courses and content organized around specific skills and roles."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8118
      namespace: pluralsight-learning-paths-api
      resources:
        - path: /v1/learning-paths
          name: learning-paths
          description: "Query learning paths"
          operations:
            - method: POST
              name: query-learning-paths
              description: "Query learning path catalog data"
              call: "pluralsight-learning-paths.query-learning-paths"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9118
      namespace: pluralsight-learning-paths-mcp
      transport: http
      tools:
        - name: query-learning-paths
          description: "Query learning path catalog data including structured sequences of courses and content organized around specific skills and roles."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-learning-paths.query-learning-paths"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
