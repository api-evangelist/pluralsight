naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Skills Assessment"
  description: "GraphQL queries for accessing skill assessments, Skill IQ scores, assessment catalogs, and competency measurements."
  tags:
    - Pluralsight
    - Skills Assessment
    - Skill IQ
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-skills-assessment
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL queries for accessing skill assessments, Skill IQ scores, assessment catalogs, and competency measurements."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: skills-assessment
          path: /graphql
          description: "Skills assessment queries via GraphQL"
          operations:
            - name: query-skills-assessment
              method: POST
              description: "Execute GraphQL queries to access skill assessments, Skill IQ scores, assessment catalogs, and competency measurements."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8126
      namespace: pluralsight-skills-assessment-api
      resources:
        - path: /v1/skills-assessments
          name: skills-assessments
          description: "Query skills assessments"
          operations:
            - method: POST
              name: query-skills-assessment
              description: "Query skill assessments and Skill IQ scores"
              call: "pluralsight-skills-assessment.query-skills-assessment"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9126
      namespace: pluralsight-skills-assessment-mcp
      transport: http
      tools:
        - name: query-skills-assessment
          description: "Query skill assessments, Skill IQ scores, assessment catalogs, and competency measurements."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-skills-assessment.query-skills-assessment"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
