naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Course Daily Usage"
  description: "GraphQL query for retrieving daily course engagement metrics and usage statistics."
  tags:
    - Pluralsight
    - Course Usage
    - Learning Analytics
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-course-daily-usage
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL query for retrieving daily course engagement metrics and usage statistics."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: course-daily-usage
          path: /graphql
          description: "Course daily usage queries via GraphQL"
          operations:
            - name: query-course-daily-usage
              method: POST
              description: "Execute GraphQL queries to retrieve daily course engagement metrics and usage statistics."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8105
      namespace: pluralsight-course-daily-usage-api
      resources:
        - path: /v1/course-daily-usage
          name: course-daily-usage
          description: "Query course daily usage"
          operations:
            - method: POST
              name: query-course-daily-usage
              description: "Retrieve daily course engagement metrics"
              call: "pluralsight-course-daily-usage.query-course-daily-usage"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9105
      namespace: pluralsight-course-daily-usage-mcp
      transport: http
      tools:
        - name: query-course-daily-usage
          description: "Retrieve daily course engagement metrics and usage statistics."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-course-daily-usage.query-course-daily-usage"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
