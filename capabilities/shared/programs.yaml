naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Programs"
  description: "GraphQL query for accessing the program catalog including structured learning programs and curriculum offerings."
  tags:
    - Pluralsight
    - Programs
    - Curriculum
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-programs
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL query for accessing the program catalog including structured learning programs and curriculum offerings."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: programs
          path: /graphql
          description: "Program catalog queries via GraphQL"
          operations:
            - name: query-programs
              method: POST
              description: "Execute GraphQL queries to access the program catalog including structured learning programs and curriculum offerings."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8122
      namespace: pluralsight-programs-api
      resources:
        - path: /v1/programs
          name: programs
          description: "Query programs"
          operations:
            - method: POST
              name: query-programs
              description: "Query the program catalog"
              call: "pluralsight-programs.query-programs"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9122
      namespace: pluralsight-programs-mcp
      transport: http
      tools:
        - name: query-programs
          description: "Query the program catalog including structured learning programs and curriculum offerings."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-programs.query-programs"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
