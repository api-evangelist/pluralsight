naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Labs"
  description: "GraphQL queries for accessing lab catalog and lab activity data for hands-on learning experiences and practical exercises."
  tags:
    - Pluralsight
    - Labs
    - Hands On Learning
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-labs
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL queries for accessing lab catalog and lab activity data for hands-on learning experiences and practical exercises."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: labs
          path: /graphql
          description: "Lab catalog and activity queries via GraphQL"
          operations:
            - name: query-labs
              method: POST
              description: "Execute GraphQL queries to access lab catalog and lab activity data for hands-on learning experiences and practical exercises."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8117
      namespace: pluralsight-labs-api
      resources:
        - path: /v1/labs
          name: labs
          description: "Query labs"
          operations:
            - method: POST
              name: query-labs
              description: "Query lab catalog and activity data"
              call: "pluralsight-labs.query-labs"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9117
      namespace: pluralsight-labs-mcp
      transport: http
      tools:
        - name: query-labs
          description: "Query lab catalog and lab activity data for hands-on learning experiences and practical exercises."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-labs.query-labs"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
