naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Tags"
  description: "GraphQL query for accessing content tags and taxonomy data used to categorize and organize learning content."
  tags:
    - Pluralsight
    - Tags
    - Taxonomy
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-tags
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL query for accessing content tags and taxonomy data used to categorize and organize learning content."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: tags
          path: /graphql
          description: "Content tag queries via GraphQL"
          operations:
            - name: query-tags
              method: POST
              description: "Execute GraphQL queries to access content tags and taxonomy data used to categorize and organize learning content."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8127
      namespace: pluralsight-tags-api
      resources:
        - path: /v1/tags
          name: tags
          description: "Query content tags"
          operations:
            - method: POST
              name: query-tags
              description: "Query content tags and taxonomy data"
              call: "pluralsight-tags.query-tags"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9127
      namespace: pluralsight-tags-mcp
      transport: http
      tools:
        - name: query-tags
          description: "Query content tags and taxonomy data used to categorize and organize learning content."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-tags.query-tags"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
