naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Content Progress"
  description: "GraphQL query for tracking user progress across all content types including videos, guides, paths, interactive courses, and projects. Currently in beta."
  tags:
    - Pluralsight
    - Content Progress
    - Learning Analytics
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-content-progress
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL query for tracking user progress across all content types including videos, guides, paths, interactive courses, and projects."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: content-progress
          path: /graphql
          description: "Content progress queries via GraphQL"
          operations:
            - name: query-content-progress
              method: POST
              description: "Execute GraphQL queries to track user progress across all content types including videos, guides, paths, interactive courses, and projects."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8102
      namespace: pluralsight-content-progress-api
      resources:
        - path: /v1/content-progress
          name: content-progress
          description: "Query content progress"
          operations:
            - method: POST
              name: query-content-progress
              description: "Track user progress across all content types"
              call: "pluralsight-content-progress.query-content-progress"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: pluralsight-content-progress-mcp
      transport: http
      tools:
        - name: query-content-progress
          description: "Track user progress across all content types including videos, guides, paths, interactive courses, and projects."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-content-progress.query-content-progress"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
