naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Licensing REST"
  description: "Legacy REST API for managing user invitations, users, and teams within a plan. Deprecated as of February 2025, removal scheduled for November 2025."
  tags:
    - Pluralsight
    - Licensing
    - User Management
    - Deprecated
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-licensing-rest
      baseUri: https://app.pluralsight.com/plans/api/license/v1
      description: "Legacy REST API for managing user invitations, users, and teams within a plan. Deprecated."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: invitations
          path: /invitations
          description: "User invitation management (deprecated)"
          operations:
            - name: list-invitations
              method: GET
              description: "Retrieve a list of pending user invitations. Deprecated - migrate to GraphQL User Management API."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-invitation
              method: POST
              description: "Send a new user invitation. Deprecated - migrate to GraphQL User Management API."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  payload: "{{tools.payload}}"
        - name: users
          path: /users
          description: "User management (deprecated)"
          operations:
            - name: list-license-users
              method: GET
              description: "Retrieve a list of users in the plan. Deprecated - migrate to GraphQL User Management API."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: teams
          path: /teams
          description: "Team management (deprecated)"
          operations:
            - name: list-license-teams
              method: GET
              description: "Retrieve a list of teams in the plan. Deprecated - migrate to GraphQL Teams API."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8119
      namespace: pluralsight-licensing-rest-api
      resources:
        - path: /v1/invitations
          name: invitations
          description: "Manage invitations (deprecated)"
          operations:
            - method: GET
              name: list-invitations
              description: "List pending invitations"
              call: "pluralsight-licensing-rest.list-invitations"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-invitation
              description: "Create a new invitation"
              call: "pluralsight-licensing-rest.create-invitation"
              with:
                payload: "rest.payload"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/license-users
          name: license-users
          description: "List plan users (deprecated)"
          operations:
            - method: GET
              name: list-license-users
              description: "List users in the plan"
              call: "pluralsight-licensing-rest.list-license-users"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/license-teams
          name: license-teams
          description: "List plan teams (deprecated)"
          operations:
            - method: GET
              name: list-license-teams
              description: "List teams in the plan"
              call: "pluralsight-licensing-rest.list-license-teams"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9119
      namespace: pluralsight-licensing-rest-mcp
      transport: http
      tools:
        - name: list-invitations
          description: "List pending user invitations. Deprecated - migrate to GraphQL User Management API."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-licensing-rest.list-invitations"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-invitation
          description: "Send a new user invitation. Deprecated - migrate to GraphQL User Management API."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          call: "pluralsight-licensing-rest.create-invitation"
          with:
            payload: "tools.payload"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-license-users
          description: "List users in the plan. Deprecated - migrate to GraphQL User Management API."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-licensing-rest.list-license-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-license-teams
          description: "List teams in the plan. Deprecated - migrate to GraphQL Teams API."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-licensing-rest.list-license-teams"
          outputParameters:
            - type: object
              mapping: "$."
