naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Flow Pull Requests"
  description: "REST API for accessing pull request data, comments, and events across repositories."
  tags:
    - Pluralsight
    - Flow
    - Pull Requests
    - Source Control
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_FLOW_BEARER_TOKEN: PLURALSIGHT_FLOW_BEARER_TOKEN
      PLURALSIGHT_FLOW_WORKSPACE: PLURALSIGHT_FLOW_WORKSPACE

capability:
  consumes:
    - type: http
      namespace: pluralsight-flow-pull-requests
      baseUri: https://{{PLURALSIGHT_FLOW_WORKSPACE}}.appfireflow.com/v3/customer/core
      description: "REST API for accessing pull request data, comments, and events across repositories."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_FLOW_BEARER_TOKEN}}"
      resources:
        - name: pull-requests
          path: /pull-requests
          description: "Pull request data and events"
          operations:
            - name: get-pull-requests
              method: GET
              description: "Retrieve pull request data, comments, and events across repositories."
              inputParameters:
                - name: start_date
                  in: query
                  type: string
                  required: false
                  description: "Start date for the query period"
                - name: end_date
                  in: query
                  type: string
                  required: false
                  description: "End date for the query period"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8112
      namespace: pluralsight-flow-pull-requests-api
      resources:
        - path: /v1/pull-requests
          name: pull-requests
          description: "Access pull request data"
          operations:
            - method: GET
              name: get-pull-requests
              description: "Retrieve pull request data and events"
              call: "pluralsight-flow-pull-requests.get-pull-requests"
              with:
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9112
      namespace: pluralsight-flow-pull-requests-mcp
      transport: http
      tools:
        - name: get-pull-requests
          description: "Retrieve pull request data, comments, and events across repositories."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-flow-pull-requests.get-pull-requests"
          with:
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
