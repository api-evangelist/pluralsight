naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Channels"
  description: "GraphQL queries and mutations for managing content channels including creating channels, managing members and groups, organizing content sections, and tracking channel progress."
  tags:
    - Pluralsight
    - Channels
    - Content Management
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-channels
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL queries and mutations for managing content channels including creating channels, managing members and groups, organizing content sections, and tracking channel progress."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: channels
          path: /graphql
          description: "Channel management via GraphQL"
          operations:
            - name: manage-channels
              method: POST
              description: "Execute GraphQL queries and mutations for managing content channels including creating channels, managing members and groups, organizing content sections, and tracking channel progress."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8100
      namespace: pluralsight-channels-api
      resources:
        - path: /v1/channels
          name: channels
          description: "Manage content channels"
          operations:
            - method: POST
              name: manage-channels
              description: "Execute GraphQL queries and mutations for channel management"
              call: "pluralsight-channels.manage-channels"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: pluralsight-channels-mcp
      transport: http
      tools:
        - name: manage-channels
          description: "Execute GraphQL queries and mutations for managing content channels including creating channels, managing members and groups, organizing content sections, and tracking channel progress."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          call: "pluralsight-channels.manage-channels"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
