naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Course Progress"
  description: "GraphQL query for tracking user course progress including completion status and viewing history for video courses. Updated daily."
  tags:
    - Pluralsight
    - Course Progress
    - Learning Analytics
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-course-progress
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL query for tracking user course progress including completion status and viewing history for video courses."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: course-progress
          path: /graphql
          description: "Course progress queries via GraphQL"
          operations:
            - name: query-course-progress
              method: POST
              description: "Execute GraphQL queries to track user course progress including completion status and viewing history for video courses."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8106
      namespace: pluralsight-course-progress-api
      resources:
        - path: /v1/course-progress
          name: course-progress
          description: "Query course progress"
          operations:
            - method: POST
              name: query-course-progress
              description: "Track user course progress and completion status"
              call: "pluralsight-course-progress.query-course-progress"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9106
      namespace: pluralsight-course-progress-mcp
      transport: http
      tools:
        - name: query-course-progress
          description: "Track user course progress including completion status and viewing history for video courses."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-course-progress.query-course-progress"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
