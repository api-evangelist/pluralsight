naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Plan Info"
  description: "GraphQL query for retrieving account and plan details including subscription tier and configuration."
  tags:
    - Pluralsight
    - Plan Info
    - Account Management
    - GraphQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_BEARER_TOKEN: PLURALSIGHT_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-plan-info
      baseUri: https://paas-api.pluralsight.com
      description: "GraphQL query for retrieving account and plan details including subscription tier and configuration."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_BEARER_TOKEN}}"
      resources:
        - name: plan-info
          path: /graphql
          description: "Plan info queries via GraphQL"
          operations:
            - name: query-plan-info
              method: POST
              description: "Execute GraphQL queries to retrieve account and plan details including subscription tier and configuration."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The GraphQL query string"
                - name: variables
                  in: body
                  type: object
                  required: false
                  description: "Variables for the GraphQL query"
                - name: operationName
                  in: body
                  type: string
                  required: false
                  description: "Name of the operation to execute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8120
      namespace: pluralsight-plan-info-api
      resources:
        - path: /v1/plan-info
          name: plan-info
          description: "Query plan info"
          operations:
            - method: POST
              name: query-plan-info
              description: "Retrieve account and plan details"
              call: "pluralsight-plan-info.query-plan-info"
              with:
                query: "rest.query"
                variables: "rest.variables"
                operationName: "rest.operationName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9120
      namespace: pluralsight-plan-info-mcp
      transport: http
      tools:
        - name: query-plan-info
          description: "Retrieve account and plan details including subscription tier and configuration."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-plan-info.query-plan-info"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
