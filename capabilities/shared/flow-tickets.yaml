naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Flow Tickets"
  description: "REST API for accessing ticket data including comments, events, and project associations from connected project management tools."
  tags:
    - Pluralsight
    - Flow
    - Tickets
    - Project Management
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_FLOW_BEARER_TOKEN: PLURALSIGHT_FLOW_BEARER_TOKEN
      PLURALSIGHT_FLOW_WORKSPACE: PLURALSIGHT_FLOW_WORKSPACE

capability:
  consumes:
    - type: http
      namespace: pluralsight-flow-tickets
      baseUri: https://{{PLURALSIGHT_FLOW_WORKSPACE}}.appfireflow.com/v3/customer/core
      description: "REST API for accessing ticket data including comments, events, and project associations from connected project management tools."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_FLOW_BEARER_TOKEN}}"
      resources:
        - name: tickets
          path: /tickets
          description: "Ticket data and events"
          operations:
            - name: get-tickets
              method: GET
              description: "Retrieve ticket data including comments, events, and project associations from connected project management tools."
              inputParameters:
                - name: start_date
                  in: query
                  type: string
                  required: false
                  description: "Start date for the query period"
                - name: end_date
                  in: query
                  type: string
                  required: false
                  description: "End date for the query period"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8115
      namespace: pluralsight-flow-tickets-api
      resources:
        - path: /v1/tickets
          name: tickets
          description: "Access ticket data"
          operations:
            - method: GET
              name: get-tickets
              description: "Retrieve ticket data and events"
              call: "pluralsight-flow-tickets.get-tickets"
              with:
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9115
      namespace: pluralsight-flow-tickets-mcp
      transport: http
      tools:
        - name: get-tickets
          description: "Retrieve ticket data including comments, events, and project associations from connected project management tools."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-flow-tickets.get-tickets"
          with:
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
