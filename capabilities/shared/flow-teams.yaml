naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Flow Teams"
  description: "REST API for managing Flow engineering teams and team membership data."
  tags:
    - Pluralsight
    - Flow
    - Teams
    - Team Management
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_FLOW_BEARER_TOKEN: PLURALSIGHT_FLOW_BEARER_TOKEN
      PLURALSIGHT_FLOW_WORKSPACE: PLURALSIGHT_FLOW_WORKSPACE

capability:
  consumes:
    - type: http
      namespace: pluralsight-flow-teams
      baseUri: https://{{PLURALSIGHT_FLOW_WORKSPACE}}.appfireflow.com/v3/customer/core
      description: "REST API for managing Flow engineering teams and team membership data."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_FLOW_BEARER_TOKEN}}"
      resources:
        - name: flow-teams
          path: /teams
          description: "Flow team management"
          operations:
            - name: list-flow-teams
              method: GET
              description: "Retrieve a list of Flow engineering teams and team membership data."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8114
      namespace: pluralsight-flow-teams-api
      resources:
        - path: /v1/flow-teams
          name: flow-teams
          description: "Manage Flow teams"
          operations:
            - method: GET
              name: list-flow-teams
              description: "List Flow engineering teams"
              call: "pluralsight-flow-teams.list-flow-teams"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9114
      namespace: pluralsight-flow-teams-mcp
      transport: http
      tools:
        - name: list-flow-teams
          description: "List Flow engineering teams and team membership data."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-flow-teams.list-flow-teams"
          outputParameters:
            - type: object
              mapping: "$."
