naftiko: "1.0.0-alpha1"

info:
  label: "Pluralsight Flow Coding Metrics"
  description: "REST API for accessing code-level engineering metrics and developer productivity data with date range filtering."
  tags:
    - Pluralsight
    - Flow
    - Coding Metrics
    - Engineering Productivity
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      PLURALSIGHT_FLOW_BEARER_TOKEN: PLURALSIGHT_FLOW_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pluralsight-flow-coding-metrics
      baseUri: https://flow-api.pluralsight.com
      description: "REST API for accessing code-level engineering metrics and developer productivity data."
      authentication:
        type: bearer
        token: "{{PLURALSIGHT_FLOW_BEARER_TOKEN}}"
      resources:
        - name: coding-metrics
          path: /collaboration/code/metrics
          description: "Code-level engineering metrics"
          operations:
            - name: get-coding-metrics
              method: GET
              description: "Retrieve code-level engineering metrics and developer productivity data with date range filtering."
              inputParameters:
                - name: start_date
                  in: query
                  type: string
                  required: false
                  description: "Start date for the metrics period"
                - name: end_date
                  in: query
                  type: string
                  required: false
                  description: "End date for the metrics period"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8107
      namespace: pluralsight-flow-coding-metrics-api
      resources:
        - path: /v1/coding-metrics
          name: coding-metrics
          description: "Access coding metrics"
          operations:
            - method: GET
              name: get-coding-metrics
              description: "Retrieve code-level engineering metrics"
              call: "pluralsight-flow-coding-metrics.get-coding-metrics"
              with:
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9107
      namespace: pluralsight-flow-coding-metrics-mcp
      transport: http
      tools:
        - name: get-coding-metrics
          description: "Retrieve code-level engineering metrics and developer productivity data with date range filtering."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "pluralsight-flow-coding-metrics.get-coding-metrics"
          with:
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
