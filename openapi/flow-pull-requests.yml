openapi: 3.1.0
info:
  title: Pluralsight Flow Pull Requests API
  description: REST API for accessing pull request data, comments, and events across repositories.
  version: 1.0.0
  contact:
    name: Pluralsight API Support
    email: support@pluralsight.com
    url: https://help.pluralsight.com
  license:
    name: Proprietary
    url: https://www.pluralsight.com/terms
servers:
- url: https://{workspace}.appfireflow.com/v3/customer/core
  description: Production
  variables:
    workspace:
      description: Your Flow workspace identifier
      default: your-workspace
externalDocs:
  description: Customer API References
  url: https://help.pluralsight.com/hc/en-us/sections/24176771997588-Customer-API-references
tags:
- name: Pull Requests
  description: Pull request data operations
paths:
  /pull-requests:
    get:
      summary: Pluralsight Get Pull Requests
      description: Retrieve pull request data, comments, and events across repositories.
      operationId: getPullRequests
      tags:
      - Pull Requests
      security:
      - bearerAuth: []
      parameters:
      - name: start_date
        in: query
        description: Start date for the query period
        schema:
          type: string
          format: date
        example: '2026-04-17T12:00:00Z'
      - name: end_date
        in: query
        description: End date for the query period
        schema:
          type: string
          format: date
        example: '2026-04-17T12:00:00Z'
      responses:
        '200':
          description: Successful response with pull request data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                    description: Pull request records
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '429':
          description: Too Many Requests - Rate limit exceeded
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
