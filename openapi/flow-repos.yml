openapi: 3.1.0
info:
  title: Pluralsight Flow Repos API
  description: REST API for accessing repository data and metadata across connected source control systems.
  version: 1.0.0
  contact:
    name: Pluralsight API Support
    email: support@pluralsight.com
    url: https://help.pluralsight.com
  license:
    name: Proprietary
    url: https://www.pluralsight.com/terms
servers:
- url: https://{workspace}.appfireflow.com/v3/customer/core
  description: Production
  variables:
    workspace:
      description: Your Flow workspace identifier
      default: your-workspace
externalDocs:
  description: Customer API References
  url: https://help.pluralsight.com/hc/en-us/sections/24176771997588-Customer-API-references
tags:
- name: Repos
  description: Repository data operations
paths:
  /repos:
    get:
      summary: Pluralsight Get Repositories
      description: Retrieve repository data and metadata across connected source control systems.
      operationId: getRepos
      tags:
      - Repos
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response with repository data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                    description: Repository records
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '429':
          description: Too Many Requests - Rate limit exceeded
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
