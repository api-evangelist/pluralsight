specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Pluralsight
providerId: pluralsight
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Learning
  - Education
  - SaaS
  - Engineering Metrics
description: FOCUS-aligned FinOps for Pluralsight - per-seat subscription model across the Skills
  (individual and business) and Flow product lines. Bills annually or monthly in USD. APIs are
  entitlements of the underlying seat plan rather than separate metered products.
sources:
  - https://www.pluralsight.com/individuals/pricing
  - https://www.pluralsight.com/pricing
  - https://help.pluralsight.com/help/skills-business-customer-api
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Pluralsight, LLC
serviceCategory: Learning and Development
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Pluralsight
  ServiceCategory: Learning and Development
  ServiceSubcategory: Technical Training
  ProviderName: Pluralsight
  PublisherName: Pluralsight, LLC
  InvoiceIssuerName: Pluralsight, LLC
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription
meters:
  - name: skills_seat_year
    description: Per-seat annual subscription for Pluralsight Skills (individual or Business plans).
    unit: seat
    aggregation: count
    dimensions:
      - plan
      - billing_cycle
      - business_unit
  - name: skills_seat_month
    description: Per-seat monthly subscription for Pluralsight Skills (individual plans only).
    unit: seat
    aggregation: count
    dimensions:
      - plan
      - billing_cycle
  - name: flow_developer_seat
    description: Per-developer seat for Pluralsight Flow engineering metrics.
    unit: seat
    aggregation: count
    dimensions:
      - team
      - integration_source
  - name: cloud_guru_lab_consumption
    description: Hands-on lab and sandbox consumption (included with Cloud+ and Complete plans;
      governed by fair-use rather than separate metering).
    unit: lab-session
    aggregation: count
    dimensions:
      - lab_type
      - cloud_provider
  - name: api_calls
    description: API calls against Skills GraphQL, Flow REST, and legacy REST endpoints. Not
      separately billed; included with the Business / Enterprise / Flow contract.
    unit: request
    aggregation: sum
    dimensions:
      - api
      - tenant
principles:
  - name: Visibility
    description: Track active vs assigned seats via the Skills Business admin console and the User
      Management / Licensing APIs. Track Flow consumption via Flow's admin reporting.
  - name: Allocation
    description: Allocate seat cost by mapping users (via SSO group / department attribute) to
      business units; tag Flow developers to engineering teams via the Teams API.
  - name: Optimization
    description: Audit unassigned and inactive seats quarterly; downgrade users from Complete to a
      narrower plus plan when their viewing history is concentrated in one library; consolidate
      Cloud Guru entitlements with Pluralsight Skills under one renewal.
  - name: Accountability
    description: Assign a learning-program owner per business unit responsible for seat utilization;
      finance reviews annual renewal headcount versus active-learner metrics from the Skills
      reporting API.
maintainers:
